<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Application Submitted - JobPortal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="success-bg">

<nav class="navbar navbar-custom px-3">
  <div class="container">
    <a class="brand" href="home.html"><i class="fa-solid fa-briefcase"></i> JobPortal</a>
    <div>
      <a href="home.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="success-box">
    <div class="check"><i class="fa-solid fa-check"></i></div>
    <h1>Application Submitted!</h1>
    <p class="text-muted">Thank you, <strong id="appName">Applicant</strong>. Your application for <strong id="appJob">the role</strong> has been received.</p>
    <div class="ref-num">Ref: <span id="appRef">JP-000000</span></div>
    <p style="color:#555">Our team will review your application and get back to you soon via email.</p>
    <div class="btn-row">
      <a href="jobs.html" class="btn-grad"><i class="fa-solid fa-magnifying-glass me-2"></i>Browse More Jobs</a>
      <a href="home.html" class="btn-grad alt"><i class="fa-solid fa-house me-2"></i>Back to Home</a>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
<script>
requireLogin();
const data=JSON.parse(localStorage.getItem('jp_lastApp')||'{}');
document.getElementById('appName').textContent=data.name||currentUser();
document.getElementById('appJob').textContent=data.job||'the position';
document.getElementById('appRef').textContent=data.ref||('JP-'+Date.now().toString().slice(-6));
</script>
</body>
</html>
